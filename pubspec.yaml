name: kinetix_mobile_app
description: "Kinetix — AI-powered fitness tracker with real-time pose detection."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Navigation
  go_router: ^14.8.1

  # Networking
  dio: ^5.7.0

  # Storage
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.3

  # UI & Design
  google_fonts: ^6.2.1
  confetti: ^0.8.0
  cached_network_image: ^3.4.1

  # Audio & Haptics
  flutter_tts: ^4.2.0
  audioplayers: ^6.4.0

  # Pose Detection (Phase 5)
  google_mlkit_pose_detection: ^0.13.0
  camera: ^0.11.1

  # Utilities
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # Assets will be added as needed (sounds, images)
  # assets:
  #   - assets/sounds/
